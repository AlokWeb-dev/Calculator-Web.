<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="desk">
        <div class="calculator">

            <div class="brand">
                <span class="brand-name">Basica</span>
                <span class="brand-model">MODEL&nbsp;12S</span>
            </div>

            <div class="screen">
                <div class="screen-inner">
                    <div class="ghost-digits" aria-hidden="true">88888888</div>
                    <div class="expression" id="expression">&nbsp;</div>
                    <div class="result" id="result">0</div>
                </div>
            </div>

            <div class="keys">
                <button class="key key--func" data-action="clear">AC</button>
                <button class="key key--func" data-action="backspace">⌫</button>
                <button class="key key--func" data-action="percent">%</button>
                <button class="key key--op" data-action="operator" data-op="÷">÷</button>

                <button class="key key--num" data-action="digit" data-digit="7">7</button>
                <button class="key key--num" data-action="digit" data-digit="8">8</button>
                <button class="key key--num" data-action="digit" data-digit="9">9</button>
                <button class="key key--op" data-action="operator" data-op="×">×</button>

                <button class="key key--num" data-action="digit" data-digit="4">4</button>
                <button class="key key--num" data-action="digit" data-digit="5">5</button>
                <button class="key key--num" data-action="digit" data-digit="6">6</button>
                <button class="key key--op" data-action="operator" data-op="−">−</button>

                <button class="key key--num" data-action="digit" data-digit="1">1</button>
                <button class="key key--num" data-action="digit" data-digit="2">2</button>
                <button class="key key--num" data-action="digit" data-digit="3">3</button>
                <button class="key key--op" data-action="operator" data-op="+">+</button>

                <button class="key key--num key--zero" data-action="digit" data-digit="0">0</button>
                <button class="key key--num" data-action="decimal">.</button>
                <button class="key key--equals" data-action="equals">=</button>
            </div>

        </div>

        <p class="hint">Type numbers directly on your keyboard — Enter for =, Esc for AC</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
